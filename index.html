<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常貓日誌 🐾 極簡手動版</title>
    <script src="https://cdn.tailwindcss.com"></script> 
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; color: #6B5E54; background-color: #FAF9F7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .active-tab { color: #E8B490; border-bottom: 2px solid #E8B490; }
    </style>
</head>
<body class="min-h-screen flex justify-center py-6 px-4">
    <div class="max-w-md w-full space-y-4 pb-12">
        
        <div class="bg-white rounded-3xl shadow-sm border border-orange-50 p-6 text-center"> 
            <div class="flex justify-between items-center mb-2">
                <span class="text-2xl">🐈</span>
                <input type="date" id="current-date" onchange="loadDateData()" class="border-none text-xs bg-gray-50 px-3 py-1 rounded-full">
            </div>
            <h1 class="text-md font-bold tracking-widest text-gray-500">日常紀錄</h1>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-orange-50 p-6">
            <h2 class="font-bold text-sm text-orange-300 mb-4 flex items-center gap-2">🍽️ 飲食錄入</h2>
            <form id="food-form" class="space-y-3">
                
                <div class="relative">
                    <input type="text" id="food-name" required placeholder="吃了什麼？(點擊右側搜尋營養)" class="w-full bg-gray-50 border-none rounded-xl p-3 pr-10 text-sm focus:ring-1 focus:ring-orange-200">
                    <button type="button" onclick="searchFood()" id="search-btn" class="absolute right-2 top-2 p-1 text-gray-400 hover:text-orange-400 transition-colors" title="搜尋營養成分">
                        🔍
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="relative">
                        <input type="number" id="food-calories" required placeholder="熱量" step="any" class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm">
                        <span class="absolute right-3 top-3 text-[10px] text-gray-300">kcal</span>
                    </div>
                    <div class="relative">
                        <input type="number" id="food-protein" required placeholder="蛋白" step="any" class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm">
                        <span class="absolute right-3 top-3 text-[10px] text-gray-300">g</span>
                    </div>
                </div>
                <button type="submit" class="w-full bg-orange-100 text-orange-400 py-3 rounded-xl text-sm font-bold hover:bg-orange-200 transition-colors">儲存紀錄</button>
            </form>

            <div class="grid grid-cols-2 gap-3 text-center mt-6 py-4 border-t border-gray-50">
                <div>
                    <div class="text-xl font-bold text-orange-400" id="total-calories">0</div>
                    <p class="text-[9px] text-gray-400 uppercase font-bold">已攝取 (目標 1400)</p>
                </div>
                <div class="border-l border-gray-50">
                    <div class="text-xl font-bold text-green-400" id="total-protein">0</div>
                    <p class="text-[9px] text-gray-400 uppercase font-bold">蛋白質 (目標 100g)</p>
                </div>
            </div>
            <ul id="food-list" class="space-y-2 max-h-40 overflow-y-auto mt-4"></ul>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-orange-50 p-6">
            <div class="flex justify-between items-center mb-4 text-sm font-bold text-blue-300">
                <span>💧 水分進度</span>
                <span id="water-display">0 ml</span>
            </div>
            <div class="flex gap-2">
                <button onclick="addWater(250)" class="flex-1 bg-blue-50 text-blue-400 py-2 rounded-xl text-xs font-bold">+ 250</button>
                <button onclick="addWater(500)" class="flex-1 bg-blue-50 text-blue-400 py-2 rounded-xl text-xs font-bold">+ 500</button>
            </div>
        </div>

    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('cat_minimal_db')) || {};
        const datePicker = document.getElementById('current-date');
        datePicker.value = new Date().toISOString().split('T')[0];

        function initDayData(date) {
            if (!db[date]) { db[date] = { water: 0, records: [] }; }
            return db[date];
        }

        function loadDateData() { updateUI(); }
        function save() { localStorage.setItem('cat_minimal_db', JSON.stringify(db)); }

        async function searchFood() {
            const foodName = document.getElementById('food-name').value.trim();
            if (!foodName) {
                alert('請先輸入食物名稱喔！');
                return;
            }

            const btn = document.getElementById('search-btn');
            const originalText = btn.innerText;
            btn.innerText = '⏳';

            try {
                const response = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(foodName)}&search_simple=1&action=process&json=1&page_size=1`);
                const data = await response.json();

                if (data.products && data.products.length > 0) {
                    const product = data.products[0];
                    const nutriments = product.nutriments;
                    
                    const calories = nutriments['energy-kcal_100g'] || nutriments['energy-kcal'] || 0;
                    const protein = nutriments['proteins_100g'] || nutriments['proteins'] || 0;

                    document.getElementById('food-calories').value = Math.round(calories);
                    document.getElementById('food-protein').value = Math.round(protein * 10) / 10;
                    
                    console.log(`找到：${product.product_name || foodName} (每 100g)`);
                } else {
                    alert('資料庫找不到這個食物的數值，請手動輸入喔！');
                }
            } catch (error) {
                console.error("搜尋發生錯誤", error);
                alert('搜尋失敗，請手動輸入數值。');
            } finally {
                btn.innerText = '🔍';
            }
        }

        document.getElementById('food-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = datePicker.value;
            const name = document.getElementById('food-name').value;
            const cal = parseFloat(document.getElementById('food-calories').value) || 0;
            const pro = parseFloat(document.getElementById('food-protein').value) || 0;
            initDayData(date).records.push({ id: Date.now(), name, cal, pro });
            save();
            document.getElementById('food-form').reset();
            updateUI();
        });

        function deleteRecord(id) {
            db[datePicker.value].records = db[datePicker.value].records.filter(r => r.id !== id);
            save();
            updateUI();
        }

        function addWater(ml) {
            const data = initDayData(datePicker.value);
            data.water = Math.min(data.water + ml, 3000);
            save();
            updateUI();
        }

        function resetWater() { db[datePicker.value].water = 0; save(); updateUI(); }

        function updateUI() {
            const data = initDayData(datePicker.value);
            document.getElementById('water-display').innerText = `${data.water} ml`;
            const totalCal = Math.round(data.records.reduce((s, r) => s + r.cal, 0));
            const totalPro = Math.round(data.records.reduce((s, r) => s + r.pro, 0) * 10) / 10;
            document.getElementById('total-calories').innerText = totalCal;
            document.getElementById('total-protein').innerText = totalPro;
            const list = document.getElementById('food-list');
            list.innerHTML = data.records.map(r => `
                <li class="flex justify-between items-center bg-gray-50 p-3 rounded-xl text-xs">
                    <div><b>${r.name}</b> <span class="text-gray-400 ml-2">${r.cal}kcal / ${r.pro}g</span></div>
                    <button onclick="deleteRecord(${r.id})" class="text-gray-300">✕</button>
                </li>
            `).join('');
        }
        loadDateData();
    </script>
</body>
</html>
