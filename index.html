<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常貓日誌 🐾 複製與開啟版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cat-bg': '#FAF9F7',       
                        'cat-main': '#E8B490',     
                        'cat-green': '#B8C5B0',    
                        'cat-text': '#6B5E54',     
                        'cat-card': '#FFFFFF',
                        'cat-border': '#F2EEE7'    
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; color: #6B5E54; background-color: #FAF9F7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { color: #E8B490; border-bottom: 3px solid #E8B490; }
        input[type="date"] { color: #6B5E54; font-weight: bold; background: transparent; }
        .task-checkbox:checked + label { text-decoration: line-through; color: #B8C5B0; }
    </style>
</head>
<body class="min-h-screen flex justify-center py-6 px-4">

    <div class="max-w-md w-full space-y-4 pb-24">
        
        <div class="bg-cat-card rounded-[2.5rem] shadow-sm border border-cat-border p-6 text-center">
            <div class="flex justify-between items-center mb-4">
                <span class="text-3xl">🐈</span>
                <input type="date" id="current-date" onchange="loadDateData()" class="border-none text-xs focus:outline-none cursor-pointer bg-cat-bg px-4 py-1.5 rounded-full">
            </div>
            <h1 class="text-lg font-bold tracking-widest text-cat-text mb-4">日常貓日誌</h1>
            
            <div class="flex bg-cat-bg rounded-full p-1 border border-cat-border text-[10px]">
                <button id="mode-weekday" onclick="setMode('weekday')" class="flex-1 py-2 rounded-full font-medium transition-all">平日 (運動日)</button>
                <button id="mode-rest" onclick="setMode('rest')" class="flex-1 py-2 rounded-full font-medium transition-all">假日 / 生理期</button>
            </div>
        </div>

        <div class="flex border-b border-cat-border bg-cat-card rounded-t-[2rem] px-4 pt-1">
            <button id="tab-log" onclick="switchTab('log')" class="flex-1 py-3 text-sm font-bold active-tab transition-all">AI 快速分析</button>
            <button id="tab-stats" onclick="switchTab('stats')" class="flex-1 py-3 text-sm font-bold text-gray-400 transition-all">趨勢圖表</button>
        </div>

        <div id="content-log" class="tab-content active space-y-4">
            
            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
                <h2 class="font-bold flex items-center gap-2 mb-3 text-sm text-cat-main">📸 讓 Gemini 幫你算</h2>
                <p class="text-[10px] text-gray-400 mb-4 leading-relaxed">點擊後將自動複製提問詞，並喚醒開啟 Gemini App，請直接貼上並附上照片喵！</p>
                
                <button onclick="copyAndOpenGemini()" class="w-full bg-[#FFF9F5] text-cat-main py-4 rounded-2xl text-sm font-bold border border-[#FBE3D5] hover:bg-[#FBE3D5] transition-all flex justify-center items-center gap-2 shadow-sm">
                    <span>✨ 複製指令並開啟 Gemini App</span>
                </button>
            </div>

            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
                <h2 class="font-bold flex items-center gap-2 mb-4 text-sm text-cat-green">✍️ 填入 AI 給您的數據</h2>
                
                <form id="food-form" class="space-y-3 mb-6 bg-cat-bg p-4 rounded-2xl">
                    <input type="text" id="food-name" required placeholder="這餐吃了什麼？" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none focus:border-cat-main">
                    <div class="grid grid-cols-2 gap-3">
                        <div class="relative">
                            <input type="number" id="food-calories" required placeholder="熱量" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none">
                            <span class="absolute right-3 top-3 text-[10px] text-gray-300">kcal</span>
                        </div>
                        <div class="relative">
                            <input type="number" id="food-protein" required placeholder="蛋白" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none">
                            <span class="absolute right-3 top-3 text-[10px] text-gray-300">g</span>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-cat-text text-white py-3 rounded-xl text-sm font-bold hover:bg-black transition-colors">儲存紀錄</button>
                </form>

                <div class="grid grid-cols-2 gap-3 text-center mb-4">
                    <div>
                        <div class="text-2xl font-bold text-cat-main" id="total-calories">0</div>
                        <p class="text-[9px] text-gray-400 uppercase font-bold">今天已攝取 (目標 <span id="target-cal">1400</span>)</p>
                    </div>
                    <div class="border-l border-cat-border">
                        <div class="text-2xl font-bold text-cat-green" id="total-protein">0</div>
                        <p class="text-[9px] text-gray-400 uppercase font-bold">總蛋白質 (目標 100g)</p>
                    </div>
                </div>

                <ul id="food-list" class="space-y-2 max-h-40 overflow-y-auto no-scrollbar border-t border-cat-border pt-4"></ul>
            </div>

            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold text-sm">💧 水分進度</h2>
                    <button onclick="resetWater()" class="text-[10px] text-gray-300">重置</button>
                </div>
                <div class="flex items-end gap-2 mb-3">
                    <span class="text-3xl font-bold text-[#8DB4CB]" id="water-display">0</span>
                    <span class="text-xs text-gray-400 mb-1">/ 2000 ml</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="addWater(250)" class="flex-1 bg-blue-50 text-blue-400 py-2.5 rounded-xl text-xs font-bold border border-blue-100">+ 250</button>
                    <button onclick="addWater(500)" class="flex-1 bg-blue-50 text-blue-400 py-2.5 rounded-xl text-xs font-bold border border-blue-100">+ 500</button>
                </div>
            </div>

            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6" id="routine-module">
                <h2 class="font-bold text-sm mb-4">🌙 夜間防護線</h2>
                <div class="space-y-4">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="t1" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                        <label for="t1" class="text-xs font-medium">21:00 開始：growwithjo 運動</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="t2" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                        <label for="t2" class="text-xs font-medium">22:00 完成核心與收操</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="t3" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                        <label for="t3" class="text-xs font-medium">22:30 數位斷網</label>
                    </div>
                    <div class="flex items-center gap-3">
                        <input type="checkbox" id="t4" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                        <label for="t4" class="text-xs font-medium">23:30 準時入睡</label>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-stats" class="tab-content space-y-4">
            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6 text-center">
                <h2 class="font-bold text-sm mb-6">7日熱量與蛋白質趨勢</h2>
                <div id="chart-cal-container" class="w-full h-40 bg-cat-bg rounded-xl mb-6 relative px-4 flex items-end"></div>
                <div id="chart-pro-container" class="w-full h-40 bg-cat-bg rounded-xl relative px-4 flex items-end"></div>
                <div class="flex justify-between text-[8px] text-gray-400 mt-4 px-2" id="chart-dates"></div>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('cat_v9_db')) || {};
        const datePicker = document.getElementById('current-date');
        datePicker.value = new Date().toISOString().split('T')[0];

        // 核心連動功能：先複製指令，再透過 Universal Link 開啟 Gemini App
        function copyAndOpenGemini() {
            const currentData = db[datePicker.value];
            const targetCal = currentData.mode === 'weekday' ? '1400 大卡' : '1300 大卡';
            
            const prompt = `這是我今天的飲食照片。我是身高 155、體重 70 的 41 歲女性，目前卡在停滯期。我的目標是 ${targetCal}，蛋白質目標 100g。\n請幫我：\n1. 估算照片中食物的總熱量與蛋白質。\n2. 依據我的狀況，給出一句具體的飲食優化建議喵。`;

            // 優先嘗試使用現代 Clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(prompt).then(() => {
                    openGeminiApp();
                }).catch(err => {
                    fallbackCopyAndOpen(prompt);
                });
            } else {
                fallbackCopyAndOpen(prompt);
            }
        }

        // 執行跳轉至 Gemini App
        function openGeminiApp() {
            // 提供不帶複雜參數的乾淨網址，確保作業系統能正確識別並喚醒原生 App
            window.open('https://gemini.google.com/', '_blank');
        }

        // 手機端備用複製方案
        function fallbackCopyAndOpen(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                openGeminiApp();
            } catch (err) {
                alert('複製失敗，可能需要您手動框選複製喵。');
            }
            document.body.removeChild(textArea);
        }

        function initDayData(date) {
            if (!db[date]) { 
                db[date] = { mode: 'weekday', water: 0, records: [], tasks: { t1: false, t2: false, t3: false, t4: false } }; 
            }
            return db[date];
        }

        function loadDateData() {
            const data = initDayData(datePicker.value);
            setModeUI(data.mode);
            updateUI();
        }

        function setMode(mode) {
            db[datePicker.value].mode = mode;
            setModeUI(mode);
            save();
            updateUI();
        }

        function setModeUI(mode) {
            const btnW = document.getElementById('mode-weekday');
            const btnR = document.getElementById('mode-rest');
            if (mode === 'weekday') {
                btnW.className = "flex-1 py-2 rounded-full bg-white shadow-sm font-bold text-cat-main transition-all";
                btnR.className = "flex-1 py-2 rounded-full text-gray-400 font-medium transition-all";
                document.getElementById('routine-module').style.display = 'block';
                document.getElementById('target-cal').innerText = '1400';
            } else {
                btnR.className = "flex-1 py-2 rounded-full bg-white shadow-sm font-bold text-cat-main transition-all";
                btnW.className = "flex-1 py-2 rounded-full text-gray-400 font-medium transition-all";
                document.getElementById('routine-module').style.display = 'none';
                document.getElementById('target-cal').innerText = '1300';
            }
        }

        function save() { localStorage.setItem('cat_v9_db', JSON.stringify(db)); }

        document.getElementById('food-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const date = datePicker.value;
            const name = document.getElementById('food-name').value;
            const cal = parseFloat(document.getElementById('food-calories').value) || 0;
            const pro = parseFloat(document.getElementById('food-protein').value) || 0;
            db[date].records.push({ id: Date.now(), name, cal, pro });
            save();
            document.getElementById('food-form').reset();
            updateUI();
        });

        function deleteRecord(id) {
            db[datePicker.value].records = db[datePicker.value].records.filter(r => r.id !== id);
            save();
            updateUI();
        }

        function addWater(ml) { db[datePicker.value].water = Math.min((db[datePicker.value].water || 0) + ml, 2000); save(); updateUI(); }
        function resetWater() { db[datePicker.value].water = 0; save(); updateUI(); }
        function saveTasks() {
            const d = datePicker.value;
            db[d].tasks = { t1: document.getElementById('t1').checked, t2: document.getElementById('t2').checked, t3: document.getElementById('t3').checked, t4: document.getElementById('t4').checked };
            save();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('active-tab', 'text-cat-main'));
            document.getElementById(`content-${tab}`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active-tab', 'text-cat-main');
            if(tab === 'stats') renderCharts();
        }

        function updateUI() {
            const data = db[datePicker.value];
            document.getElementById('water-display').innerText = data.water || 0;
            const totalCal = Math.round((data.records || []).reduce((s, r) => s + r.cal, 0));
            const totalPro = Math.round((data.records || []).reduce((s, r) => s + r.pro, 0) * 10) / 10;
            document.getElementById('total-calories').innerText = totalCal;
            document.getElementById('total-protein').innerText = totalPro;
            const target = data.mode === 'weekday' ? 1400 : 1300;
            document.getElementById('total-calories').className = totalCal > target ? 'text-2xl font-bold text-red-400' : 'text-2xl font-bold text-cat-main';
            const list = document.getElementById('food-list');
            list.innerHTML = (data.records || []).map(r => `
                <li class="flex justify-between items-center bg-white p-3 rounded-xl border border-cat-border mb-2 shadow-sm">
                    <div class="flex flex-col text-left"><span class="text-sm font-bold text-cat-text">${r.name}</span><span class="text-[9px] text-gray-400">${r.cal} kcal / ${r.pro}g 蛋白</span></div>
                    <button onclick="deleteRecord(${r.id})" class="text-gray-300">✕</button>
                </li>
            `).join('') || '<li class="text-center text-gray-300 text-[10px] py-4">等待 AI 分析結果...</li>';
            document.getElementById('t1').checked = data.tasks?.t1 || false;
            document.getElementById('t2').checked = data.tasks?.t2 || false;
            document.getElementById('t3').checked = data.tasks?.t3 || false;
            document.getElementById('t4').checked = data.tasks?.t4 || false;
        }

        function renderCharts() {
            const days = [];
            for(let i=6; i>=0; i--) { const d = new Date(new Date().setDate(new Date().getDate() - i)); days.push(d.toISOString().split('T')[0]); }
            const calData = days.map(d => (db[d]?.records || []).reduce((s,r) => s+r.cal, 0));
            const proData = days.map(d => (db[d]?.records || []).reduce((s,r) => s+r.pro, 0));
            document.getElementById('chart-dates').innerHTML = days.map(d => `<span>${d.slice(5).replace('-','/')}</span>`).join('');
            drawChart('chart-cal-container', calData, 2000, '#E8B490');
            drawChart('chart-pro-container', proData, 120, '#B8C5B0');
        }

        function drawChart(id, data, max, color) {
            const container = document.getElementById(id);
            const w = container.clientWidth - 32; const h = 120; const step = w / 6;
            let pts = data.map((v, i) => `${i * step},${h - (Math.min(v, max) / max * h)}`).join(' ');
            container.innerHTML = `<svg width="${w}" height="${h}" class="overflow-visible"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />${data.map((v, i) => `<circle cx="${i * step}" cy="${h - (Math.min(v, max) / max * h)}" r="4" fill="${color}" stroke="#fff" stroke-width="2" />`).join('')}</svg>`;
        }

        loadDateData();
    </script>
</body>
</html>
