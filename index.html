<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日常貓日誌 🐾 211餐盤版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cat-bg': '#FAF9F7',       
                        'cat-main': '#E8B490',     
                        'cat-green': '#B8C5B0',    
                        'cat-text': '#6B5E54',     
                        'cat-card': '#FFFFFF',
                        'cat-border': '#F2EEE7'    
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; color: #6B5E54; background-color: #FAF9F7; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .task-checkbox:checked + label { text-decoration: line-through; color: #B8C5B0; }
        
        /* 211 按鈕點擊後的狀態 */
        .btn-veg.active { background-color: #e6f2e6; border-color: #B8C5B0; color: #5c8a5c; }
        .btn-pro.active { background-color: #fff0e6; border-color: #E8B490; color: #d97736; }
        .btn-car.active { background-color: #fdf5e6; border-color: #f0d5a8; color: #c49a45; }
    </style>
</head>
<body class="min-h-screen flex justify-center py-6 px-4">

    <div class="max-w-md w-full space-y-4 pb-12">
        
        <div class="bg-cat-card rounded-[2.5rem] shadow-sm border border-cat-border p-6 text-center">
            <div class="flex justify-between items-center mb-4">
                <span class="text-3xl">🐈</span>
                <input type="date" id="current-date" onchange="loadDateData()" class="border-none text-xs focus:outline-none cursor-pointer bg-cat-bg px-4 py-1.5 rounded-full font-bold">
            </div>
            <h1 class="text-lg font-bold tracking-widest text-cat-text mb-2">日常貓日誌</h1>
            <p class="text-[10px] text-gray-400">放下數字焦慮，專注在餐盤的視覺比例喵！</p>
        </div>

        <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold flex items-center gap-2 text-sm text-cat-text">🍽️ 211 餐盤打卡</h2>
                <div class="text-[9px] text-gray-400 bg-cat-bg px-2 py-1 rounded-md">蔬菜半盤 / 蛋白質1拳 / 碳水1拳</div>
            </div>

            <div class="space-y-4">
                <div class="bg-cat-bg p-4 rounded-2xl border border-cat-border/50">
                    <h3 class="text-xs font-bold mb-3 text-gray-500">☀️ 早餐</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="toggleMeal('breakfast', 'veg')" id="breakfast-veg" class="btn-veg py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🥦 蔬菜 (1/2)</button>
                        <button onclick="toggleMeal('breakfast', 'pro')" id="breakfast-pro" class="btn-pro py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🥩 蛋白 (1/4)</button>
                        <button onclick="toggleMeal('breakfast', 'car')" id="breakfast-car" class="btn-car py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🍠 碳水 (1/4)</button>
                    </div>
                </div>

                <div class="bg-cat-bg p-4 rounded-2xl border border-cat-border/50">
                    <h3 class="text-xs font-bold mb-3 text-gray-500">🌞 午餐</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="toggleMeal('lunch', 'veg')" id="lunch-veg" class="btn-veg py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🥦 蔬菜 (1/2)</button>
                        <button onclick="toggleMeal('lunch', 'pro')" id="lunch-pro" class="btn-pro py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🥩 蛋白 (1/4)</button>
                        <button onclick="toggleMeal('lunch', 'car')" id="lunch-car" class="btn-car py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🍠 碳水 (1/4)</button>
                    </div>
                </div>

                <div class="bg-cat-bg p-4 rounded-2xl border border-cat-border/50">
                    <h3 class="text-xs font-bold mb-3 text-gray-500">🌙 晚餐</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="toggleMeal('dinner', 'veg')" id="dinner-veg" class="btn-veg py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🥦 蔬菜 (1/2)</button>
                        <button onclick="toggleMeal('dinner', 'pro')" id="dinner-pro" class="btn-pro py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🥩 蛋白 (1/4)</button>
                        <button onclick="toggleMeal('dinner', 'car')" id="dinner-car" class="btn-car py-3 rounded-xl text-xs font-bold border border-gray-200 bg-white text-gray-400 transition-colors">🍠 碳水 (1/4)</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold flex items-center gap-2 text-sm">💧 水分進度</h2>
                <button onclick="resetWater()" class="text-[10px] text-gray-400 hover:text-red-400">重置</button>
            </div>
            <div class="flex items-end gap-2 mb-3">
                <span class="text-3xl font-bold text-[#8DB4CB]" id="water-display">0</span>
                <span class="text-xs text-gray-400 mb-1">/ 2000 ml</span>
            </div>
            <div class="flex gap-2 mb-4">
                <button onclick="addWater(250)" class="flex-1 bg-[#F0F6FA] text-[#7A9BB0] py-2.5 rounded-xl text-xs font-bold border border-[#E1EDF4]">+ 250</button>
                <button onclick="addWater(500)" class="flex-1 bg-[#F0F6FA] text-[#7A9BB0] py-2.5 rounded-xl text-xs font-bold border border-[#E1EDF4]">+ 500</button>
            </div>
            <div class="w-full bg-gray-100 rounded-full h-1.5">
                <div id="water-bar" class="bg-[#8DB4CB] h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
            <h2 class="font-bold flex items-center gap-2 mb-4 text-sm">🌙 夜間作息防線</h2>
            <div class="space-y-4">
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="t1" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                    <label for="t1" class="text-xs font-medium cursor-pointer w-full">21:00 開始：growwithjo</label>
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="t2" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                    <label for="t2" class="text-xs font-medium cursor-pointer w-full">22:00 完成核心與收操</label>
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="t3" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                    <label for="t3" class="text-xs font-medium cursor-pointer w-full">22:30 數位斷網</label>
                </div>
                <div class="flex items-center gap-3">
                    <input type="checkbox" id="t4" onchange="saveTasks()" class="task-checkbox w-4 h-4 accent-cat-green">
                    <label for="t4" class="text-xs font-medium cursor-pointer w-full">23:30 準時入睡</label>
                </div>
            </div>
        </div>

    </div>

    <script>
        // 資料庫結構更新為 211 紀錄
        let db = JSON.parse(localStorage.getItem('cat_v211_db')) || {};
        const datePicker = document.getElementById('current-date');
        datePicker.value = new Date().toISOString().split('T')[0];

        function initDayData(date) {
            if (!db[date]) { 
                db[date] = { 
                    water: 0, 
                    meals: {
                        breakfast: { veg: false, pro: false, car: false },
                        lunch: { veg: false, pro: false, car: false },
                        dinner: { veg: false, pro: false, car: false }
                    },
                    tasks: { t1: false, t2: false, t3: false, t4: false } 
                }; 
            }
            return db[date];
        }

        function loadDateData() {
            initDayData(datePicker.value);
            updateUI();
        }

        function save() { localStorage.setItem('cat_v211_db', JSON.stringify(db)); }

        // 211 打卡邏輯
        function toggleMeal(mealType, category) {
            const date = datePicker.value;
            db[date].meals[mealType][category] = !db[date].meals[mealType][category];
            save();
            updateUI();
        }

        // 水分邏輯
        function addWater(ml) {
            const date = datePicker.value;
            db[date].water = Math.min((db[date].water || 0) + ml, 2000);
            save();
            updateUI();
        }

        function resetWater() {
            db[datePicker.value].water = 0;
            save();
            updateUI();
        }

        // 任務邏輯
        function saveTasks() {
            const date = datePicker.value;
            db[date].tasks = {
                t1: document.getElementById('t1').checked,
                t2: document.getElementById('t2').checked,
                t3: document.getElementById('t3').checked,
                t4: document.getElementById('t4').checked
            };
            save();
        }

        // 介面更新
        function updateUI() {
            const data = db[datePicker.value];
            
            // 更新水分
            document.getElementById('water-display').innerText = data.water || 0;
            document.getElementById('water-bar').style.width = `${((data.water || 0) / 2000) * 100}%`;

            // 更新 211 按鈕狀態
            const meals = ['breakfast', 'lunch', 'dinner'];
            const categories = ['veg', 'pro', 'car'];
            
            meals.forEach(meal => {
                categories.forEach(cat => {
                    const btn = document.getElementById(`${meal}-${cat}`);
                    if (data.meals[meal][cat]) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
            });

            // 更新任務勾選
            document.getElementById('t1').checked = data.tasks?.t1 || false;
            document.getElementById('t2').checked = data.tasks?.t2 || false;
            document.getElementById('t3').checked = data.tasks?.t3 || false;
            document.getElementById('t4').checked = data.tasks?.t4 || false;
        }

        // 啟動
        loadDateData();
    </script>
</body>
</html>
