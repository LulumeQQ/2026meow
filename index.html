<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極簡貓日誌 🐾 FatSecret便利版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cat-bg': '#FCFBF9',       /* 極淡牛奶底色 */
                        'cat-main': '#DDBFA5',     /* 極淡奶茶橘 */
                        'cat-green': '#B4C0AD',    /* 極淡抹茶綠 */
                        'cat-text': '#7A726A',     /* 溫和灰棕色 */
                        'cat-card': '#FFFFFF',
                        'cat-border': '#F0EBE1'    /* 幾乎隱形的邊線 */
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; color: #7A726A; background-color: #FCFBF9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .active-tab { color: #DDBFA5; border-bottom: 3px solid #DDBFA5; }
        input[type="date"] { color: #7A726A; font-weight: bold; background: transparent; }
        input::placeholder { color: #D1CCC5; }
    </style>
</head>
<body class="min-h-screen flex justify-center py-6 px-4">

    <div class="max-w-md w-full space-y-4 pb-24">
        
        <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <span class="text-3xl">🐾</span>
                    <h1 class="text-lg font-bold tracking-widest text-cat-text">日常貓日誌</h1>
                </div>
                <input type="date" id="current-date" onchange="loadDateData()" class="border-none text-xs focus:outline-none cursor-pointer">
            </div>
            
            <div class="flex border-b border-cat-border">
                <button id="tab-log" onclick="switchTab('log')" class="flex-1 py-3 text-sm font-bold active-tab transition-all">日常紀錄</button>
                <button id="tab-stats" onclick="switchTab('stats')" class="flex-1 py-3 text-sm font-bold text-gray-400 transition-all">數據趨勢</button>
            </div>
        </div>

        <div id="content-log" class="tab-content active space-y-4">
            
            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6 relative">
                <h2 class="font-bold flex items-center gap-2 mb-4 text-sm">🍽️ 隨打即找紀錄</h2>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-orange-50/30 p-4 rounded-3xl border border-orange-50 text-center">
                        <div class="text-2xl font-bold text-cat-main" id="total-calories">0</div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase mt-1">累積大卡</p>
                    </div>
                    <div class="bg-green-50/30 p-4 rounded-3xl border border-green-50 text-center">
                        <div class="text-2xl font-bold text-cat-green" id="total-protein">0</div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase mt-1">累積蛋白(g)</p>
                    </div>
                </div>

                <div class="bg-cat-bg p-4 rounded-2xl border border-cat-border mb-4">
                    
                    <div class="relative w-full z-10" id="search-container">
                        <input type="text" id="search-input" onkeyup="handleSearch()" onfocus="handleSearch()" placeholder="🔍 搜尋食物 (如: 雞、地瓜、飯)" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none focus:border-cat-main transition-colors">
                        
                        <div id="search-dropdown" class="absolute w-full bg-white border border-cat-border rounded-xl mt-1 shadow-lg max-h-48 overflow-y-auto hidden">
                            </div>
                    </div>

                    <div id="selected-panel" class="hidden mt-4 pt-4 border-t border-cat-border/50">
                        <div class="flex justify-between items-center mb-3">
                            <span id="selected-food-name" class="font-bold text-sm text-cat-text"></span>
                            <button onclick="cancelSelection()" class="text-[10px] text-gray-400 hover:text-red-400">重新搜尋</button>
                        </div>
                        
                        <div class="grid grid-cols-3 gap-2 items-center">
                            <div class="col-span-1 relative">
                                <input type="number" id="input-weight" oninput="calculateRealTime()" placeholder="重量" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none focus:border-cat-main">
                                <span class="absolute right-3 top-3 text-[10px] text-gray-400">g</span>
                            </div>
                            <div class="col-span-2 text-right text-xs text-gray-500">
                                <span class="font-bold text-cat-main text-lg" id="calc-cal">0</span> kcal<br>
                                <span class="font-bold text-cat-green" id="calc-pro">0</span> g 蛋白
                            </div>
                        </div>
                        
                        <button onclick="saveRecord()" class="w-full bg-cat-text text-white py-3 rounded-xl text-sm font-bold tracking-wider hover:bg-gray-800 transition-colors mt-4">紀錄這餐</button>
                    </div>

                    <div id="manual-panel" class="hidden mt-4 pt-4 border-t border-cat-border/50">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-bold text-sm text-gray-400">✏️ 手動輸入</span>
                            <button onclick="cancelSelection()" class="text-[10px] text-gray-400 hover:text-red-400">取消</button>
                        </div>
                        <input type="text" id="manual-name" placeholder="食物名稱" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none focus:border-cat-main mb-2">
                        <div class="grid grid-cols-2 gap-2 mb-4">
                            <input type="number" id="manual-cal" placeholder="總大卡 (kcal)" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none focus:border-cat-main">
                            <input type="number" id="manual-pro" placeholder="總蛋白 (g)" class="w-full bg-white border border-cat-border rounded-xl p-3 text-sm focus:outline-none focus:border-cat-main">
                        </div>
                        <button onclick="saveManualRecord()" class="w-full bg-gray-400 text-white py-3 rounded-xl text-sm font-bold tracking-wider hover:bg-gray-600 transition-colors">手動紀錄</button>
                    </div>

                </div>

                <ul id="food-list" class="space-y-2 max-h-48 overflow-y-auto no-scrollbar"></ul>
            </div>

            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="font-bold flex items-center gap-2 text-sm">💧 水分進度</h2>
                    <button onclick="resetWater()" class="text-[10px] text-gray-400 hover:text-cat-main transition-colors">重置</button>
                </div>
                <div class="flex items-end gap-2 mb-3">
                    <span class="text-3xl font-bold text-[#A8C5D6]" id="water-display">0</span>
                    <span class="text-xs text-gray-400 mb-1">/ 2000 ml</span>
                </div>
                <div class="flex gap-2 mb-4">
                    <button onclick="addWater(250)" class="flex-1 bg-[#F5F8FA] text-[#8BAEBE] py-2.5 rounded-xl text-xs font-bold border border-[#E8F0F4] hover:bg-[#E8F0F4] transition-colors">+ 250</button>
                    <button onclick="addWater(500)" class="flex-1 bg-[#F5F8FA] text-[#8BAEBE] py-2.5 rounded-xl text-xs font-bold border border-[#E8F0F4] hover:bg-[#E8F0F4] transition-colors">+ 500</button>
                </div>
                <div class="w-full bg-gray-50 rounded-full h-1.5">
                    <div id="water-bar" class="bg-[#A8C5D6] h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <div id="content-stats" class="tab-content space-y-4">
            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
                <h2 class="font-bold text-sm mb-6 text-cat-text">📈 7日熱量趨勢 (Kcal)</h2>
                <div id="chart-cal-container" class="w-full h-40 bg-cat-bg rounded-xl relative flex items-end justify-between px-4 pb-6"></div>
                <div class="flex justify-between text-[9px] text-gray-400 mt-2 px-1" id="chart-dates-cal"></div>
            </div>
            <div class="bg-cat-card rounded-[2rem] shadow-sm border border-cat-border p-6">
                <h2 class="font-bold text-sm mb-6 text-cat-text">🌿 7日蛋白質趨勢 (g)</h2>
                <div id="chart-pro-container" class="w-full h-40 bg-cat-bg rounded-xl relative flex items-end justify-between px-4 pb-6"></div>
                <div class="flex justify-between text-[9px] text-gray-400 mt-2 px-1" id="chart-dates-pro"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 擴充版在地食物資料庫 (以 100g 為基準) ---
        const foodDB = [
            // 雞肉類
            { name: "烤雞胸肉", c: 165, p: 31 }, { name: "水煮雞胸肉", c: 110, p: 23 }, { name: "舒肥雞胸肉", c: 120, p: 24 },
            { name: "烤雞腿肉", c: 220, p: 24 }, { name: "滷雞腿", c: 170, p: 18 }, { name: "炸雞排", c: 320, p: 16 },
            // 豬牛魚肉類
            { name: "豬里肌", c: 150, p: 22 }, { name: "五花肉", c: 360, p: 14 }, { name: "牛腱", c: 130, p: 28 }, 
            { name: "牛排", c: 250, p: 26 }, { name: "鮭魚", c: 208, p: 20 }, { name: "鯖魚", c: 417, p: 14 }, 
            { name: "鮪魚罐頭", c: 110, p: 25 }, { name: "蝦子", c: 90, p: 20 },
            // 蛋豆奶類
            { name: "水煮蛋", c: 140, p: 13 }, { name: "茶葉蛋", c: 140, p: 13 }, { name: "荷包蛋", c: 190, p: 13 }, 
            { name: "炒蛋", c: 200, p: 13 }, { name: "無糖豆漿", c: 35, p: 3.5 }, { name: "低糖豆漿", c: 45, p: 3 },
            { name: "嫩豆腐", c: 50, p: 5 }, { name: "板豆腐", c: 88, p: 8.5 }, { name: "鮮奶", c: 65, p: 3 }, { name: "希臘優格", c: 90, p: 10 },
            // 主食類
            { name: "白飯", c: 183, p: 3 }, { name: "糙米飯", c: 110, p: 3 }, { name: "五穀飯", c: 120, p: 3 },
            { name: "地瓜", c: 86, p: 1.6 }, { name: "馬鈴薯", c: 77, p: 2 }, { name: "燕麥片", c: 389, p: 16 },
            { name: "白吐司", c: 290, p: 9 }, { name: "全麥吐司", c: 260, p: 10 }, { name: "義大利麵", c: 150, p: 5 },
            // 常見台式外食與配菜
            { name: "滷肉飯", c: 220, p: 6 }, { name: "牛肉麵", c: 120, p: 7 }, { name: "水餃", c: 250, p: 8 }, 
            { name: "炒青菜", c: 80, p: 2 }, { name: "燙青菜", c: 35, p: 1 }, { name: "高麗菜", c: 25, p: 1.3 }, 
            { name: "花椰菜", c: 30, p: 3 },
            // 點心與水果
            { name: "香蕉", c: 89, p: 1 }, { name: "蘋果", c: 52, p: 0.3 }, { name: "芭樂", c: 38, p: 1 }, 
            { name: "堅果", c: 600, p: 15 }, { name: "黑巧克力", c: 540, p: 7 }, { name: "珍珠奶茶", c: 70, p: 0.5 }
        ];

        let activeFood = null; // 當前選取的食物物件
        let db = JSON.parse(localStorage.getItem('cat_v5_db')) || {};
        const datePicker = document.getElementById('current-date');
        datePicker.value = new Date().toISOString().split('T')[0];

        // --- 核心系統啟動 ---
        function loadDateData() {
            if (!db[datePicker.value]) { db[datePicker.value] = { water: 0, records: [] }; }
            updateUI();
        }

        function save() { localStorage.setItem('cat_v5_db', JSON.stringify(db)); }

        // --- FatSecret 搜尋引擎邏輯 ---
        function handleSearch() {
            const query = document.getElementById('search-input').value.trim();
            const dropdown = document.getElementById('search-dropdown');
            
            if (query.length === 0) {
                dropdown.classList.add('hidden');
                return;
            }

            // 過濾資料庫
            const results = foodDB.filter(food => food.name.includes(query));
            
            // 渲染下拉選單
            dropdown.innerHTML = '';
            if (results.length > 0) {
                results.forEach(food => {
                    const item = document.createElement('div');
                    item.className = "p-3 border-b border-cat-border/50 hover:bg-orange-50 cursor-pointer flex justify-between items-center transition-colors";
                    item.innerHTML = `
                        <span class="text-sm font-bold text-cat-text">${food.name}</span>
                        <span class="text-[10px] text-gray-400">${food.c} kcal, ${food.p}g 蛋白 / 100g</span>
                    `;
                    item.onclick = () => selectFood(food);
                    dropdown.appendChild(item);
                });
            } else {
                const noResult = document.createElement('div');
                noResult.className = "p-3 text-center text-xs text-gray-400";
                noResult.innerHTML = "找不到相關食物<br><button onclick='openManual()' class='mt-2 text-cat-main font-bold underline'>切換手動輸入</button>";
                dropdown.appendChild(noResult);
            }
            dropdown.classList.remove('hidden');
        }

        // --- 食物選擇與計算邏輯 ---
        function selectFood(food) {
            activeFood = food;
            document.getElementById('search-input').value = '';
            document.getElementById('search-container').classList.add('hidden');
            document.getElementById('search-dropdown').classList.add('hidden');
            
            // 顯示計算面板
            document.getElementById('selected-panel').classList.remove('hidden');
            document.getElementById('selected-food-name').innerText = food.name;
            
            // 焦點自動跳到重量輸入框 (優化 UX)
            document.getElementById('input-weight').value = '';
            document.getElementById('input-weight').focus();
            calculateRealTime();
        }

        function calculateRealTime() {
            if (!activeFood) return;
            const weight = parseFloat(document.getElementById('input-weight').value) || 0;
            const cal = Math.round((activeFood.c * weight) / 100);
            const pro = Math.round((activeFood.p * weight) / 100 * 10) / 10;
            
            document.getElementById('calc-cal').innerText = cal;
            document.getElementById('calc-pro').innerText = pro;
        }

        function saveRecord() {
            const weight = parseFloat(document.getElementById('input-weight').value);
            if (!weight || weight <= 0) { alert("請輸入正確重量喵！"); return; }
            
            const cal = Math.round((activeFood.c * weight) / 100);
            const pro = Math.round((activeFood.p * weight) / 100 * 10) / 10;
            
            db[datePicker.value].records.push({ id: Date.now(), name: activeFood.name, weight: weight, cal: cal, pro: pro });
            save();
            cancelSelection();
            updateUI();
        }

        // --- 手動輸入模式邏輯 ---
        function openManual() {
            document.getElementById('search-container').classList.add('hidden');
            document.getElementById('search-dropdown').classList.add('hidden');
            document.getElementById('manual-panel').classList.remove('hidden');
        }

        function saveManualRecord() {
            const name = document.getElementById('manual-name').value;
            const cal = parseFloat(document.getElementById('manual-cal').value) || 0;
            const pro = parseFloat(document.getElementById('manual-pro').value) || 0;
            if(!name) return;
            
            db[datePicker.value].records.push({ id: Date.now(), name: name, weight: '自訂', cal: cal, pro: pro });
            save();
            document.getElementById('manual-name').value = '';
            document.getElementById('manual-cal').value = '';
            document.getElementById('manual-pro').value = '';
            cancelSelection();
            updateUI();
        }

        function cancelSelection() {
            activeFood = null;
            document.getElementById('selected-panel').classList.add('hidden');
            document.getElementById('manual-panel').classList.add('hidden');
            document.getElementById('search-container').classList.remove('hidden');
            document.getElementById('search-input').value = '';
        }

        function deleteRecord(id) {
            db[datePicker.value].records = db[datePicker.value].records.filter(r => r.id !== id);
            save();
            updateUI();
        }

        // --- 水分與介面更新邏輯 ---
        function addWater(ml) { db[datePicker.value].water = Math.min((db[datePicker.value].water || 0) + ml, 2000); save(); updateUI(); }
        function resetWater() { db[datePicker.value].water = 0; save(); updateUI(); }
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('button[id^="tab-"]').forEach(b => b.classList.remove('active-tab', 'text-cat-main'));
            document.getElementById(`content-${tab}`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active-tab', 'text-cat-main');
            if(tab === 'stats') renderCharts();
        }

        function updateUI() {
            const data = db[datePicker.value];
            document.getElementById('water-display').innerText = data.water || 0;
            document.getElementById('water-bar').style.width = `${((data.water || 0) / 2000) * 100}%`;

            const totalCal = Math.round((data.records || []).reduce((s, r) => s + r.cal, 0));
            const totalPro = Math.round((data.records || []).reduce((s, r) => s + r.pro, 0) * 10) / 10;
            document.getElementById('total-calories').innerText = totalCal;
            document.getElementById('total-protein').innerText = totalPro;

            const list = document.getElementById('food-list');
            list.innerHTML = (data.records || []).map(r => `
                <li class="flex justify-between items-center bg-white p-4 rounded-2xl border border-cat-border/50 mb-2 shadow-sm">
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-cat-text">${r.name} <span class="text-[10px] text-gray-400 font-normal">(${r.weight} g/ml)</span></span>
                        <span class="text-[10px] text-gray-400 font-medium mt-0.5">${r.cal} kcal / ${r.pro}g 蛋白</span>
                    </div>
                    <button onclick="deleteRecord(${r.id})" class="text-gray-300 hover:text-red-400 text-lg transition-colors">✕</button>
                </li>
            `).join('') || '<li class="text-center text-gray-300 text-[10px] py-10">今天還沒紀錄喵～</li>';
        }

        // --- 繪圖邏輯 (保持不變) ---
        function renderCharts() {
            const last7Days = [];
            for(let i=6; i>=0; i--) {
                const d = new Date(new Date().setDate(new Date().getDate() - i));
                last7Days.push(d.toISOString().split('T')[0]);
            }
            const calData = last7Days.map(date => (db[date]?.records || []).reduce((s,r) => s+r.cal, 0));
            const proData = last7Days.map(date => (db[date]?.records || []).reduce((s,r) => s+r.pro, 0));
            const datesHTML = last7Days.map(d => `<span>${d.slice(5).replace('-','/')}</span>`).join('');
            document.getElementById('chart-dates-cal').innerHTML = datesHTML;
            document.getElementById('chart-dates-pro').innerHTML = datesHTML;
            drawSVGLine('chart-cal-container', calData, 2000, '#DDBFA5');
            drawSVGLine('chart-pro-container', proData, 120, '#B4C0AD');
        }

        function drawSVGLine(containerId, data, maxVal, color) {
            const container = document.getElementById(containerId);
            const w = container.clientWidth - 32; const h = 120; const step = w / 6;
            let points = data.map((val, i) => `${i * step},${h - (Math.min(val, maxVal) / maxVal * h)}`).join(' ');
            container.innerHTML = `<svg width="${w}" height="${h}" class="overflow-visible">
                <polyline points="${points}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                ${data.map((val, i) => `<circle cx="${i * step}" cy="${h - (Math.min(val, maxVal) / maxVal * h)}" r="4" fill="${color}" stroke="#fff" stroke-width="2" />`).join('')}
            </svg>`;
        }

        // 隱藏點擊外部時的選單
        document.addEventListener('click', (e) => {
            if (!document.getElementById('search-container').contains(e.target)) {
                document.getElementById('search-dropdown').classList.add('hidden');
            }
        });

        loadDateData();
    </script>
</body>
</html>
